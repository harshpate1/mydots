$city = Bhopal
$country = India
$wallpaper = ~/.cache/hypr/current_wallpaper 

# source = colors.conf

# Background
background {
    path = $wallpaper
    blur_passes = 3
	contrast = 0.8916
	brightness = 0.8172
	vibrancy = 0.1696
    vibrancy_darkness = 0.0 
}

# General
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# Time
label {                 
    text = $TIME
    color = rgba(216, 222, 233, 0.70)
    font_size = 85
    font_family = FiraCode Nerd Font Prop Bold
    position = 0, 310
    halign = center
    valign = center
}

# Date-Month-Date
label {
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d")"
    color = rgba(216, 222, 233, 0.50)
    font_size = 30
    font_family = FiraCode Nerd Font Propo Semibold
    position = 0, 400
    halign = center
    valign = center
}

# Profile-Photo
image {
    monitor = 
    path = /home/harsh/Pictures/Me/picrew_1752002398207577.png
    border_color = 0xffdddddd
    border_size = 0
    size = 110
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 0, -255
    halign = center
    valign = center
}

# User
label {
    monitor = 
    text =  $USER
    color = rgb(200, 200, 200)
    outline_thickness = 0
    font_size = 12
    font_family = FiraCode Nerd Font Propo Semibold
    position = 0, -360
    halign = center
    valign = center
}

# User Box
shape {
    monitor = 
    size = 170, 40
    color = rgba(100, 114, 125, 0.4)
    rounding = -1
    border_size = 0
    border_color = rgba(255, 255, 255, 1)
    rotate = 0
    xray = false
    position = 0, -360
    halign = center
    valign = center
}

# Input Field
input-field {
    monitor =
    size = 170, 40
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(100, 114, 125, 0.4)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = FiraCode Nerd Font Propo Semibold
    placeholder_text = <span foreground="##ffffff99">Enter Password</span>
    hide_input = false
    position = 0, -410
    halign = center
    valign = center
}

# Current Song
label {
    monitor =
    text = cmd[update:1000] echo "$(bash ~/.config/hypr/hyprlock/scripts/currently-playing.sh)"
    color = rgba(255, 255, 255, 0.7)
    font_size = 14
    font_family = FiraCode Nerd Font Propo Medium
    position = 100, 0
    halign = left
    valign = center
}

# Weathercast & Location
label {
    monitor =
    text = cmd[update:1000] echo "$(bash ~/.config/hypr/hyprlock/scripts/weather.sh)"
    shadow_passes = 1
    shadow_boost = 0.5
    color = rgba(255, 255, 255, 0.7)
    font_size = 14
    font_family = FiraCode Nerd Font Propo Medium
    position = -100, 0
    halign = right
    valign = center
}

# SYSTEM STATUS DISPLAY
label {
    # Display settings
    monitor =                   # Empty = apply to all monitors
    text = cmd[update:5000] echo " $(top -bn1 | grep "Cpu(s)" | awk '{print $2}' | cut -d'%' -f1)% | 󰍛 $(free -m | awk 'NR==2{printf "%.1f%%", $3*100/$2}') | 󰆼 $(df -h / | awk 'NR==2{print $5}')"  # Combined system info
    position = 10, 10           # Position relative to center
    halign = bottom             # Horizontal alignment
    valign = left             # Vertical alignment

    # Text styling
    color = rgba(216, 222, 233, 0.70)            # Text color
    font_size = 10              # Font size
    font_family = FiraCode Nerd Font Propo Medium         # Font family

    # Shadow effects
    shadow_passes = 8           # Shadow quality
    shadow_size = 15            # Shadow size
}

# Battery Status
label {
    # Display settings
    monitor =                   # Empty = apply to all monitors
    text = cmd[update:5000] echo "$(bash ~/.config/hypr/hyprlock/scripts/battery.sh)"
    position = -130, 10           # Position relative to center
    halign = right             # Horizontal alignment
    valign = bottom              # Vertical alignment

    # Text styling
    color = rgba(216, 222, 233, 0.70)            # Text color
    font_size = 10              # Font size
    font_family = FiraCode Nerd Font Propo Medium         # Font family

    # Shadow effects
    shadow_passes = 8           # Shadow quality
    shadow_size = 15            # Shadow size
}

# Keyboard Layout
label {
    # Display settings
    monitor =                   # Empty = apply to all monitors
    text = | $LAYOUT # Combined system info
    position = -10, 10           # Position relative to center
    halign = right             # Horizontal alignment
    valign = bottom              # Vertical alignment

    # Text styling
    color = rgba(216, 222, 233, 0.70)            # Text color
    font_size = 10              # Font size
    font_family = FiraCode Nerd Font Propo Medium         # Font family

    # Shadow effects
    shadow_passes = 8           # Shadow quality
    shadow_size = 15            # Shadow size
}

# Shutdown
label {
    monitor = 
    text = 󰐥 
    position = -10, 0
    halign = right
    valign = top
    onclick = systemctl poweroff

    # Text styling
    color = rgba(216, 222, 233, 0.70)            # Text color
    font_size = 14              # Font size
    font_family = FiraCode Nerd Font Propo Medium         # Font family

    # Shadow effects
    shadow_passes = 8           # Shadow quality
    shadow_size = 15            # Shadow size
}

# Reboot
label {
    monitor = 
    text = 󰜉 
    position = -10, -25
    halign = right
    valign = top
    onclick = systemctl reboot

    # Text styling
    color = rgba(216, 222, 233, 0.70)            # Text color
    font_size = 14              # Font size
    font_family = FiraCode Nerd Font Propo Medium         # Font family

    # Shadow effects
    shadow_passes = 8           # Shadow quality
    shadow_size = 15            # Shadow size
}

# Hibernate (Save to Disk)
label {
    monitor = 
    text = 󰤄 
    position = -10, -50
    halign = right
    valign = top
    onclick = systemctl hibernate

    # Text styling
    color = rgba(216, 222, 233, 0.70)            # Text color
    font_size = 14              # Font size
    font_family = FiraCode Nerd Font Propo Medium         # Font family

    # Shadow effects
    shadow_passes = 8           # Shadow quality
    shadow_size = 15            # Shadow size
}

# Suspend (Suspend to RAM)
label {
    monitor = 
    text =  
    position = -10, -75
    halign = right
    valign = top
    onclick = systemctl suspend

    # Text styling
    color = rgba(216, 222, 233, 0.70)            # Text color
    font_size = 14              # Font size
    font_family = FiraCode Nerd Font Propo Medium         # Font family

    # Shadow effects
    shadow_passes = 8           # Shadow quality
    shadow_size = 15            # Shadow size
}