"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = """
$os\
$username\
$directory\
$git_branch\
$git_status\
$character\
"""
right_format = """
$time\
$status\
$cmd_duration\
"""

palette = 'wallust'

[palettes.wallust]

bg = '{{background}}'
fg = '{{foreground}}'
color0 = '{{color0}}'
color1 = '{{color1}}'
color2 = '{{color2}}'
color3 = '{{color3}}'
color4 = '{{color4}}'
color5 = '{{color5}}'
color6 = '{{color6}}'
color7 = '{{color7}}'
color8 = '{{color8}}'
color9 = '{{color9}}'
color10 = '{{color10}}'
color11 = '{{color11}}'
color12 = '{{color12}}'
color13 = '{{color13}}'
color14 = '{{color14}}'
color15 = '{{color15}}'

[os]
format = '[$symbol]($style)'
style = '{{color14}}'
disabled = false

[os.symbols]
Arch = "َ°£‡ "

[username]
style_user = '{{foreground}}'
style_root = '{{color13}}'
format = '[$user]($style) '
show_always = true

[directory]
truncation_length = 4
truncate_to_repo  = true
format            ='[$path]($style)[$read_only]($read_only_style) '
style = "{{color11}}"
read_only = "َ°Œ¾ "
read_only_style = "red"
truncation_symbol = "â€¦/"

[directory.substitutions]
"Documents" = "َ°ˆ™ "
"Downloads" = "ï€™ "
"Music" = "ï€پ "
"Pictures" = "ï€¾ "

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style) '
symbol = "ï„¦ "
style = "{{color13}}"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "{{color12}}"

[character]
success_symbol = "[â‌¯]({{color14}})"
error_symbol = "[â‌¯]({{color13}})"
vimcmd_symbol = "[â‌®]({{color14}})"
vimcmd_replace_one_symbol = "[â‌®]({{color11}})"
vimcmd_replace_symbol = "[â‌®]({{color11}})"
vimcmd_visual_symbol = "[â‌®]({{color7}})"

[cmd_duration]
min_time = 500
format = 'took [$duration]($style) '
style = "{{color7}}"

[status]
format = '[$symbol$status]($style) '
style = "{{color13}}"
symbol = "âœ— "
not_executable_symbol = "îھ‡ "
not_found_symbol = "ï€‚ "
sigint_symbol = "َ±ٹˆ "
signal_symbol = "ïƒ§ "
map_symbol = true

[battery]
full_symbol = "َ°پ¹ "
charging_symbol = "َ°‚„ "
discharging_symbol = "َ°‚ƒ "
unknown_symbol = "َ°‚‘ "
empty_symbol = "َ°‚ژ "
format = '[$symbol$percentage]($style) '

[time]
format = '[ ïگ؛ $time ]($style)'
disabled = false
time_format = "%R" # Hour:Minute Format
style = "{{color7}}"